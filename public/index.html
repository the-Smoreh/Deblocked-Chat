<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Deblocked Chat</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="app">
      <div class="chat-card" role="region" aria-label="Deblocked Chat conversation">
        <header class="chat-card__header">
          <h1 class="chat-card__title">Deblocked Chat</h1>
          <span class="chat-card__online" id="onlineCount" aria-live="polite">Online: 0</span>
        </header>
        <main class="chat-card__messages" id="messages" aria-live="polite"></main>
        <form class="chat-card__form" id="messageForm" autocomplete="off">
          <label class="field" for="username">
            <span class="field__label">Username</span>
            <input
              type="text"
              id="username"
              name="username"
              placeholder="Enter your username"
              maxlength="24"
              required
            />
          </label>
          <label class="field" for="messageInput">
            <span class="field__label">Message</span>
            <textarea
              id="messageInput"
              name="message"
              placeholder="Type your message"
              rows="2"
              maxlength="500"
            ></textarea>
          </label>
          <div class="form-actions">
            <label class="upload" for="fileInput">
              <input type="file" id="fileInput" accept="image/png,image/jpeg,image/jpg,image/gif,image/webp" />
              <span>Upload</span>
            </label>
            <button type="submit" class="send-button">Send</button>
          </div>
          <p class="form-status" id="formStatus" role="status" aria-live="polite"></p>
        </form>
      </div>
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
